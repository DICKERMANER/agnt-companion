<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="自定義AGNT虛擬AI伴侶" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
    <title>自定義AGNT虛擬AI伴侶（可以瑟瑟） v3.0-beta</title>
    <meta name="version" content="v3.0-beta (2026-07-01)" />
  </head>
  <body>
    <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
    <div id="stageTransition" class="stage-transition" aria-live="polite">
      <div class="stage-transition-card">
        <div class="stage-transition-kicker">RELATIONSHIP</div>
        <div id="stageTransitionText" class="stage-transition-text">新的關係階段已解鎖</div>
      </div>
    </div>

    <div id="modelDrawer" class="model-drawer" aria-hidden="true">
      <div class="model-drawer-backdrop" id="modelDrawerBackdrop"></div>
      <aside class="model-panel" aria-label="模型切換">
        <div class="model-panel-header">
          <div>
            <div class="model-panel-title">切換模型</div>
            <div class="model-panel-subtitle">像 Hermes /model 一樣切換 API 或本地模型</div>
          </div>
          <div class="model-settings-card">
            <label class="switch-input">
              <input type="checkbox" id="thinkingToggle" />
              <span>Thinking (思考模式)</span>
            </label>
            <label class="switch-input">
              <input type="checkbox" id="fastToggle" />
              <span>Fast Mode (省 token)</span>
            </label>
            <select id="reasoningEffort">
              <option value="minimal">Minimal</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="max">Max</option>
            </select>
          </div>
          <button id="closeModelDrawer" class="icon-button" type="button">✕</button>
        </div>
        <div id="modelList" class="model-list"></div>
      </aside>
    </div>

    <div id="personaDrawer" class="model-drawer" aria-hidden="true">
      <div class="model-drawer-backdrop" id="personaDrawerBackdrop"></div>
      <aside class="model-panel persona-panel" aria-label="人格自訂">
        <div class="model-panel-header">
          <div>
            <div class="model-panel-title">人格後宮 (Persona Harem)</div>
            <div class="model-panel-subtitle">建立、切換或修改你的專屬陪伴靈魂</div>
          </div>
          <button id="closePersonaDrawer" class="icon-button" type="button">✕</button>
        </div>

        <div id="soulList" class="soul-list" aria-label="已儲存的角色"></div>

        <div class="persona-form">
          <input type="text" id="personaName" placeholder="角色名稱 (e.g. 星野 Nova)" />
          <input type="text" id="personaBirthday" placeholder="生日/星座 (e.g. 1999-08-19 獅子座)" />
          <div class="persona-avatar-row">
            <input type="hidden" id="personaAvatar" />
            <button id="uploadAvatarBtn" type="button" class="ghost-btn">上傳頭貼</button>
            <input type="file" id="avatarUploadFile" accept="image/*" hidden />
            <div id="avatarPreview" class="avatar-preview">👑</div>
            <button id="avatarAiPromptBtn" type="button" class="ghost-btn" data-action="換頭像：請切換成新的造型並描述細節。">AI 換頭像</button>
          </div>
          <textarea id="personaSoul" rows="6" placeholder="Soul.md 性格核心設定，可貼上完整人格描述..."></textarea>

          <div class="persona-soul-actions">
            <button id="newSoulBtn" type="button" class="ghost-btn">＋ 新建角色</button>
            <button id="importSoulBtn" type="button" class="ghost-btn">匯入 Soul.md</button>
            <button id="exportSoulBtn" type="button" class="ghost-btn">匯出 Soul.md</button>
            <input type="file" id="importSoulFile" accept=".md,text/markdown" hidden />
          </div>

          <button id="savePersona" type="button" class="primary-btn">儲存靈魂</button>
        </div>
      </aside>
    </div>

    <div class="line-app-shell">
      <header class="line-chat-header">
        <button class="icon-button" type="button" aria-label="返回">‹</button>
        <div class="avatar" id="headerAvatar">👑</div>
        <div class="chat-title-block">
          <div class="chat-title">自定義AGNT虛擬AI伴侶（可以瑟瑟）</div>
          <div class="chat-subtitle">
            <span id="currentModelLabel">模型載入中...</span>
            <span class="dot-separator">·</span>
            <span id="stageBadge" class="stage-badge">cold</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="personaHeaderBtn" class="icon-button" type="button" title="人格後宮" aria-label="人格後宮">👤</button>
          <button id="modelButton" class="model-button" type="button">/model</button>
        </div>
      </header>

      <section class="line-status-strip">
        <span>💎 <strong id="diamondsBalance">--</strong></span>
        <span>💗 <strong id="favorText">0 / 100</strong></span>
        <progress id="favorBar" value="0" max="100"></progress>
      </section>

      <main id="chatWindow" class="line-chat-window">
        <div class="system-chip">今天</div>
        <div class="system-chip compact">⚠️ AI 生成內容僅供陪伴互動參考</div>
        <div id="typingIndicator" class="typing-indicator" hidden>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-label">正在輸入...</span>
        </div>
      </main>

      <section class="quick-actions line-quick-actions">
        <button data-action="拍拍肩：給我溫柔安撫與鼓勵。">拍拍肩</button>
        <button data-action="換場景：切換到新的沉浸式場景。">換場景</button>
        <button data-action="給予否定：請表現低落與需要被理解的情緒。">否定</button>
        <button data-action="給予肯定：請表現開心、依戀與獎勵感。">肯定</button>
      </section>

      <!-- 貼圖面板 -->
      <div id="stickerPanel" class="sticker-panel" hidden>
        <div class="sticker-grid" id="stickerGrid"></div>
      </div>

      <!-- ＋ 媒體選單 -->
      <div id="mediaMenu" class="media-menu" hidden>
        <button class="media-menu-item" id="mmCamera" type="button">
          <span class="mm-icon">📷</span><span>拍照</span>
        </button>
        <button class="media-menu-item" id="mmPhoto" type="button">
          <span class="mm-icon">🖼️</span><span>相冊</span>
        </button>
        <button class="media-menu-item" id="mmFile" type="button">
          <span class="mm-icon">📄</span><span>文件</span>
        </button>
        <button class="media-menu-item" id="mmVoice" type="button">
          <span class="mm-icon">🎙️</span><span>錄音</span>
        </button>
      </div>

      <!-- 隱藏 file inputs -->
      <input type="file" id="cameraInput"  accept="image/*" capture="environment" hidden />
      <input type="file" id="photoInput"   accept="image/*" hidden />
      <input type="file" id="fileInput"    accept="*/*" hidden />

      <footer class="line-composer">
        <button id="mediaMenuBtn" class="plus-button" type="button">＋</button>
        <button id="stickerBtn" class="sticker-button" type="button">😊</button>
        <div class="composer-input-wrap">
          <input id="userInput" type="text" placeholder="Aa" autocomplete="off" />
        </div>
        <button id="voiceBtn" class="voice-button" type="button" hidden>🎙️</button>
        <button id="sendBtn" class="send-button" type="button">➤</button>
      </footer>
      <!-- 靈魂 drawer 觸發保留舊 id，隱藏後由 header 工具列取代 -->
      <button id="openPersonaDrawer" hidden></button>
    </div>

    <!-- 🔗 後端 URL — 本地開發用 127.0.0.1:8002，tunnel 時再換 -->
    <script>window.CYBER_COMPANION_BACKEND = "https://along-brochures-digest-gates.trycloudflare.com";</script>
    <script src="./app.js"></script>
  </body>
</html>
